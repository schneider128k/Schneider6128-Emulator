<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray   text { fill: #444441; }
    .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue   text { fill: #0C447C; }
    .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal   text { fill: #085041; }
    .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber  text { fill: #633806; }
  </style>
</defs>

<!-- CPU block -->
<g class="c-purple">
  <rect x="20" y="40" width="210" height="390" rx="14" stroke-width="0.5"/>
  <text class="th" x="125" y="68" text-anchor="middle">Z80 CPU</text>
</g>

<!-- Registers -->
<g class="c-gray">
  <rect x="40" y="88" width="170" height="38" rx="6" stroke-width="0.5"/>
  <text class="th" x="74" y="107" text-anchor="middle" dominant-baseline="central">PC</text>
  <text class="ts" x="202" y="107" text-anchor="end" dominant-baseline="central">16-bit</text>
</g>
<g class="c-gray">
  <rect x="40" y="136" width="170" height="38" rx="6" stroke-width="0.5"/>
  <text class="th" x="74" y="155" text-anchor="middle" dominant-baseline="central">SP</text>
  <text class="ts" x="202" y="155" text-anchor="end" dominant-baseline="central">16-bit</text>
</g>
<g class="c-gray">
  <rect x="40" y="184" width="170" height="38" rx="6" stroke-width="0.5"/>
  <text class="th" x="74" y="203" text-anchor="middle" dominant-baseline="central">A</text>
  <text class="ts" x="202" y="203" text-anchor="end" dominant-baseline="central">accumulator</text>
</g>
<g class="c-gray">
  <rect x="40" y="232" width="170" height="38" rx="6" stroke-width="0.5"/>
  <text class="th" x="74" y="251" text-anchor="middle" dominant-baseline="central">B</text>
  <text class="ts" x="202" y="251" text-anchor="end" dominant-baseline="central">auxiliary</text>
</g>
<g class="c-gray">
  <rect x="40" y="280" width="170" height="38" rx="6" stroke-width="0.5"/>
  <text class="th" x="74" y="299" text-anchor="middle" dominant-baseline="central">F</text>
  <text class="ts" x="202" y="299" text-anchor="end" dominant-baseline="central">S Z H P/V N C</text>
</g>
<g class="c-teal">
  <rect x="40" y="334" width="170" height="76" rx="6" stroke-width="0.5"/>
  <text class="th" x="125" y="360" text-anchor="middle" dominant-baseline="central">Branch logic</text>
  <text class="ts" x="125" y="382" text-anchor="middle" dominant-baseline="central">reads F register</text>
</g>

<!-- Memory block -->
<g class="c-blue">
  <rect x="450" y="40" width="210" height="390" rx="14" stroke-width="0.5"/>
  <text class="th" x="555" y="68" text-anchor="middle">64 KB RAM</text>
</g>

<!-- Memory regions -->
<g class="c-gray">
  <rect x="468" y="88" width="174" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="107" text-anchor="middle" dominant-baseline="central">0x0000</text>
  <text class="ts" x="555" y="125" text-anchor="middle" dominant-baseline="central">program / entry vector</text>
</g>
<g class="c-gray">
  <rect x="468" y="146" width="174" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="165" text-anchor="middle" dominant-baseline="central">0x4000</text>
  <text class="ts" x="555" y="183" text-anchor="middle" dominant-baseline="central">general RAM</text>
</g>
<g class="c-gray">
  <rect x="468" y="204" width="174" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="223" text-anchor="middle" dominant-baseline="central">0x8000</text>
  <text class="ts" x="555" y="241" text-anchor="middle" dominant-baseline="central">working RAM</text>
</g>
<g class="c-teal">
  <rect x="468" y="262" width="174" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="281" text-anchor="middle" dominant-baseline="central">0xC000</text>
  <text class="ts" x="555" y="299" text-anchor="middle" dominant-baseline="central">VRAM (future)</text>
</g>
<g class="c-amber">
  <rect x="468" y="320" width="174" height="90" rx="6" stroke-width="0.5"/>
  <text class="th" x="555" y="349" text-anchor="middle" dominant-baseline="central">0xF000</text>
  <text class="ts" x="555" y="370" text-anchor="middle" dominant-baseline="central">stack segment</text>
  <text class="ts" x="555" y="390" text-anchor="middle" dominant-baseline="central">grows downward</text>
</g>

<!-- Data bus vertical rail: PC, SP, A, B only (F excluded) -->
<line x1="230" y1="107" x2="230" y2="251" stroke="#185FA5" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
<line x1="210" y1="107" x2="230" y2="107" stroke="#185FA5" stroke-width="1" opacity="0.4"/>
<line x1="210" y1="155" x2="230" y2="155" stroke="#185FA5" stroke-width="1" opacity="0.4"/>
<line x1="210" y1="203" x2="230" y2="203" stroke="#185FA5" stroke-width="1" opacity="0.4"/>
<line x1="210" y1="251" x2="230" y2="251" stroke="#185FA5" stroke-width="1" opacity="0.4"/>

<!-- Address bus: horizontal at y=131 -->
<line x1="230" y1="131" x2="450" y2="131" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="340" y="118" text-anchor="middle" fill="#534AB7">address bus</text>
<text class="ts" x="340" y="147" text-anchor="middle">PC, SP address memory</text>

<!-- Data bus: horizontal at y=203 -->
<line x1="230" y1="203" x2="450" y2="203" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" marker-start="url(#arrow)" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="340" y="190" text-anchor="middle" fill="#185FA5">data bus</text>
<text class="ts" x="340" y="219" text-anchor="middle">PC, SP, A, B &#x2194; memory</text>

<!-- F to Branch logic internal arrow -->
<line x1="125" y1="318" x2="125" y2="332" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" fill="none"/>

</svg>